<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyzagül Şahin | Art Portfolio</title>
    <style>
        /* Sitenin genel havası */
        body {
            background-color: #f0e6ff; /* O sevdiğin pastel lila */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* İşte o meşhur oyun butonu tasarımı */
        .game-button {
            background-color: #ffb3d9; /* Pastel pembe */
            border: 4px solid #4a1d4a; /* Net ve koyu çizgiler */
            color: #4a1d4a;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            text-decoration: none;
            transition: all 0.1s;
            /* Minecraft tarzı o blok gölge */
            box-shadow: 0 8px 0 #4a1d4a; 
        }

        /* Butonun üzerine gelince olacaklar */
        .game-button:hover {
            background-color: #ff91c1;
        }

        /* Butona basınca (tıklayınca) içine gömülme efekti */
        .game-button:active {
            box-shadow: 0 0 0 #4a1d4a;
            transform: translateY(8px);
        }
    </style>
</head>
<body>

    <a href="#" class="game-button">Portfolyoma Gir 🚀</a>

</body>
</html>
