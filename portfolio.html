<!DOCTYPE html>
<html lang="tr">
<head>

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .smiley {
            font-size: 150px; 
            color: #4a1d4a;
            font-weight: bold;
        }
        .back-button {
            margin-top: 10px;
            text-decoration: none;
            color: #767F9E;
            font-weight: bold;
            border-bottom: 2px solid #4a1d4a;
        }

        /* GİZLİ BUTON BURADA OLMALI (STYLE İÇİNDE) */
        .secret-spot {
            position: fixed;
            bottom: 10px; 
            right: 10px;
            width: 40px; /* Biraz büyüttüm ki daha rahat bulasın kanka */
            height: 40px;
            background-color: transparent; 
            cursor: help; 
            border: none;
            text-decoration: none;
        }
        .secret-spot:hover {
            background-color: rgba(255, 179, 217, 0.4); 
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="smiley">:)</div>
